name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p dist
          binary="gitignore"
          if [ "$GOOS" = "windows" ]; then binary="gitignore.exe"; fi
          go build -trimpath -ldflags="-s -w -X github.com/keegan-ferrett/gitignore/cmd.version=${VERSION}" -o "dist/${binary}" .

      - name: Package archive
        id: pkg
        run: |
          tag="${{ github.event.release.tag_name }}"
          base="gitignore_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            archive="${base}.zip"
            zip "${archive}" gitignore.exe
          else
            archive="${base}.tar.gz"
            tar -czf "${archive}" gitignore
          fi
          echo "archive=dist/${archive}" >> "$GITHUB_OUTPUT"

      - name: Attach archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.archive }}
